name: Export Docker Image as Tar

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to use (e.g., v1.0.0, main, latest)'
        required: true
        default: 'latest'

jobs:
  export:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate image name
      id: meta
      run: |
        TAG="${{ github.event.inputs.tag }}"
        IMAGE_NAME="coco-downloader:${TAG}"
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: false
        tags: ${{ steps.meta.outputs.image_name }}
        outputs: type=docker,dest=/tmp/coco-downloader.tar
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Upload Docker image as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coco-downloader-${{ steps.meta.outputs.tag }}
        path: /tmp/coco-downloader.tar
        retention-days: 7

    - name: Generate download instructions
      run: |
        echo "## 🐳 Docker Image Exported Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 Download and Load Instructions:" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "1. **下载工件**: 在GitHub Actions页面点击 \`coco-downloader-${{ steps.meta.outputs.tag }}\` 下载tar文件" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "2. **加载和运行镜像**:" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "# 加载镜像到Docker" >> $GITHUB_STEP_SUMMARY
        echo "docker load -i coco-downloader.tar" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# 运行容器" >> $GITHUB_STEP_SUMMARY
        echo "docker run -d -p 3000:3000 --name coco-downloader ${{ steps.meta.outputs.image_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# 检查运行状态" >> $GITHUB_STEP_SUMMARY
        echo "curl http://localhost:3000" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 镜像信息:" >> $GITHUB_STEP_SUMMARY
        echo "- **镜像名称**: ${{ steps.meta.outputs.image_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **构建标签**: ${{ steps.meta.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
        echo "- **平台**: linux/amd64" >> $GITHUB_STEP_SUMMARY
        echo "- **保留时间**: 7天" >> $GITHUB_STEP_SUMMARY
