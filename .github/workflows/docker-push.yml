name: Push Docker Image to Registries

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate tags
      id: meta
      run: |
        DOCKER_IMAGE_DOCKERHUB=${{ secrets.DOCKERHUB_USERNAME }}/coco-downloader
        DOCKER_IMAGE_GHCR=ghcr.io/${{ github.repository_owner }}/coco-downloader

        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          TAGS="${DOCKER_IMAGE_DOCKERHUB}:${VERSION},${DOCKER_IMAGE_DOCKERHUB}:latest"
          TAGS="${TAGS},${DOCKER_IMAGE_GHCR}:${VERSION},${DOCKER_IMAGE_GHCR}:latest"
        else
          BRANCH=${GITHUB_REF#refs/heads/}
          BRANCH=${BRANCH//\//-}
          TAGS="${DOCKER_IMAGE_DOCKERHUB}:${BRANCH},${DOCKER_IMAGE_DOCKERHUB}:latest"
          TAGS="${TAGS},${DOCKER_IMAGE_GHCR}:${BRANCH},${DOCKER_IMAGE_GHCR}:latest"
        fi

        echo "tags=${TAGS}" >> $GITHUB_OUTPUT
        echo "### 🏷️ Image Tags" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "${TAGS}" | tr ',' '\n' >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Generate summary
      run: |
        echo "## ✅ Docker Images Pushed Successfully!" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Pull from Docker Hub:" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "docker pull ${{ secrets.DOCKERHUB_USERNAME }}/coco-downloader:latest" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Pull from GitHub Container Registry:" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo "docker pull ghcr.io/${{ github.repository_owner }}/coco-downloader:latest" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
